name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel any in-progress run for the same branch
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: >
          dotnet publish
          src/CptcYourself.Client/CptcYourself.Client.csproj
          -c Release
          -o release
          --nologo

      - name: Fix base href for GitHub Pages
        run: |
          sed -i 's|<base href="/" />|<base href="/CPTC-Yourself/" />|g' release/wwwroot/index.html

      - name: Add .nojekyll (prevents Jekyll from ignoring _framework folder)
        run: touch release/wwwroot/.nojekyll

      - name: Copy index.html to 404.html for SPA deep-link routing
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
